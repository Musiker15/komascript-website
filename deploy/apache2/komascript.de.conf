# =============================================================================
# Apache2 vHost — KOMA-Script Homepage
# -----------------------------------------------------------------------------
# Datei:       /etc/apache2/sites-available/komascript.musiker15.de.conf
# Domain:      komascript.musiker15.de
# App-Pfad:    /opt/komascript/
# Next.js:     loopback :3100 (systemd-Service: komascript.service)
# Run-User:    komascript:komascript
# SSL:         Eigenes Wildcard-Zertifikat (*.musiker15.de)
#
# Erwartete SSL-Pfade auf dem Server (anpassen falls abweichend):
#   Zertifikat:   /etc/ssl/musiker15.de/fullchain.pem
#   Key:          /etc/ssl/musiker15.de/privkey.pem
#   Chain:        /etc/ssl/musiker15.de/chain.pem
#
# Aktivierung:
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite headers ssl http2 deflate expires
#   sudo a2ensite komascript.musiker15.de.conf
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2
# =============================================================================

# -----------------------------------------------------------------------------
# Port 80 — HTTP-zu-HTTPS Redirect
# -----------------------------------------------------------------------------
<VirtualHost *:80>
    
    ServerName komascript.musiker15.de
    ServerAdmin info@musiker15.de
    
    RewriteEngine On
    RewriteCond %{HTTPS} off 
    RewriteRule ^(.*)$ https://komascript.musiker15.de%{REQUEST_URI} [R=301,L]
    
    ErrorLog  ${APACHE_LOG_DIR}/komascript.musiker15.de-error.log
    CustomLog ${APACHE_LOG_DIR}/komascript.musiker15.de-access.log combined

</VirtualHost>

# -----------------------------------------------------------------------------
# Port 443 — HTTPS Reverse Proxy zu Next.js
# -----------------------------------------------------------------------------
<VirtualHost *:443>
    ServerName komascript.musiker15.de
    ServerAdmin info@musiker15.de

    # ---------------------------------------------------------------------
    # SSL / TLS — eigenes Wildcard-Zertifikat (*.musiker15.de)
    # ---------------------------------------------------------------------
    SSLEngine on
    SSLCertificateFile      /etc/apache2/ssl/fullchain.cer
    SSLCertificateKeyFile   /etc/apache2/ssl/_.musiker15.de_private_key.key

    # Moderne TLS-Konfiguration (Mozilla "intermediate")
    SSLProtocol               all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite            ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder       off
    SSLSessionTickets         off
    SSLCompression            off

    # OCSP Stapling
    SSLUseStapling            on
    SSLStaplingResponderTimeout 5
    SSLStaplingReturnResponderErrors off

    # HTTP/2
    Protocols h2 http/1.1

    # ---------------------------------------------------------------------
    # https → non-https Canonical
    # ---------------------------------------------------------------------
    RewriteEngine On
    RewriteCond %{HTTPS} off 
    RewriteRule ^(.*)$ https://komascript.musiker15.de%{REQUEST_URI} [R=301,L]

    # ---------------------------------------------------------------------
    # Security Header (immer setzen — auch bei 4xx/5xx)
    # ---------------------------------------------------------------------
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Header always set Cross-Origin-Opener-Policy "same-origin"
    Header always set Cross-Origin-Resource-Policy "same-origin"
    Header always set X-Permitted-Cross-Domain-Policies "none"

    # Content-Security-Policy — strikt, keine externen Ressourcen erlaubt
    #
    # Hinweise:
    # • 'unsafe-inline' für style-src ist nötig, weil Next.js zur Laufzeit
    #   inline-Styles für Streaming/Hydration injiziert.
    # • img-src: nur 'self' + data:/blob: — kein https:-Wildcard mehr, damit
    #   keine externen Bilder vom Browser geladen werden können.
    # • font-src 'self' data: — Fonts kommen aus @fontsource-variable und
    #   werden über /_next/static/media/* ausgeliefert. Keine Google/Adobe-Fonts.
    # • connect-src 'self' — keine XHR/fetch zu fremden Hosts.
    Header always set Content-Security-Policy "default-src 'self'; \
script-src 'self' 'unsafe-inline'; \
style-src 'self' 'unsafe-inline'; \
img-src 'self' data: blob:; \
font-src 'self' data:; \
connect-src 'self'; \
media-src 'self'; \
object-src 'none'; \
frame-ancestors 'self'; \
base-uri 'self'; \
form-action 'self'; \
upgrade-insecure-requests"

    # Cache-Buster Header für HTML
    <FilesMatch "\.(html?)$">
        Header set Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
    </FilesMatch>

    # ---------------------------------------------------------------------
    # Kompression
    # ---------------------------------------------------------------------
    AddOutputFilterByType DEFLATE text/html text/plain text/css text/xml \
                                  text/javascript application/javascript \
                                  application/json application/xml \
                                  application/rss+xml application/atom+xml \
                                  application/x-font-ttf font/opentype \
                                  image/svg+xml image/x-icon

    # ---------------------------------------------------------------------
    # Statische Assets direkt aus dem Filesystem ausliefern (Bypass Node)
    # ---------------------------------------------------------------------
    Alias /_next/static  /opt/komascript/.next/static
    Alias /static        /opt/komascript/public
    Alias /favicon.ico   /opt/komascript/public/favicon.ico
    Alias /favicon.svg   /opt/komascript/public/favicon.svg
    Alias /robots.txt    /opt/komascript/public/robots.txt
    Alias /manifest.webmanifest /opt/komascript/public/manifest.webmanifest

    # Globale Error-Pages — die HTML-Dateien liegen unter /var/www/html/error_pages/
    # (in apache2.conf bereits hinterlegt). Damit die unten gesetzten
    # ErrorDocument-Direktiven auch in diesem vHost greifen, müssen wir den
    # Pfad explizit verfügbar machen UND vom Proxy ausschließen (siehe unten).
    Alias /error_pages /var/www/html/error_pages

    <Directory /opt/komascript/.next/static>
        Options -Indexes +FollowSymLinks
        Require all granted
        Header set Cache-Control "public, max-age=31536000, immutable"
    </Directory>

    <Directory /opt/komascript/public>
        Options -Indexes +FollowSymLinks
        Require all granted

        # Bilder & Fonts: 30 Tage
        <FilesMatch "\.(png|jpg|jpeg|gif|webp|avif|svg|ico|woff|woff2|ttf|otf|eot)$">
            Header set Cache-Control "public, max-age=2592000"
        </FilesMatch>
    </Directory>

    <Directory /var/www/html/error_pages>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        # Error-Pages sollen NICHT gecached werden — der Fehlerzustand ist transient
        Header always set Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
    </Directory>

    # ---------------------------------------------------------------------
    # Reverse Proxy zu Next.js (Port 3100)
    # ---------------------------------------------------------------------
    ProxyPreserveHost On
    ProxyRequests Off
    ProxyTimeout 60

    # WebSocket-Upgrade (für Streaming-SSR / Server Components)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*)           ws://127.0.0.1:3100/$1 [P,L]

    # Statische Assets nicht proxen
    ProxyPass        /_next/static               !
    ProxyPass        /static                     !
    ProxyPass        /favicon.ico                !
    ProxyPass        /favicon.svg                !
    ProxyPass        /robots.txt                 !
    ProxyPass        /manifest.webmanifest       !

    # Error-Pages nicht proxen — werden direkt aus /var/www/html/error_pages/ ausgeliefert
    # (sonst würden ErrorDocument-Aufrufe bei totem Backend in einer Schleife landen)
    ProxyPass        /error_pages                !

    # Alles andere → Node
    ProxyPass        /  http://127.0.0.1:3100/  retry=0 timeout=60
    ProxyPassReverse /  http://127.0.0.1:3100/

    # Echte Client-IP an Node weiterreichen
    RequestHeader set X-Real-IP             "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-For       "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto     "https"
    RequestHeader set X-Forwarded-Host      "%{HTTP_HOST}s"

    # ---------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------
    LogLevel warn
    ErrorLog  ${APACHE_LOG_DIR}/komascript.musiker15.de-error.log
    CustomLog ${APACHE_LOG_DIR}/komascript.musiker15.de-access.log combined

    # ---------------------------------------------------------------------
    # Fehlerseite bei Proxy-Ausfall
    # ---------------------------------------------------------------------
    # ProxyErrorOverride On -> Funktioniert nicht mit WebSocket-Fehlern, daher manuell über ErrorDocument
    # ProxyErrorOverride On

    # ErrorDocument 418 /error_pages/418.html # "I'm a teapot" ist ein Easter Egg und wird hier nicht behandelt
    ErrorDocument 400 /error_pages/400.html
    ErrorDocument 401 /error_pages/401.html
    ErrorDocument 403 /error_pages/403.html
    ErrorDocument 404 /error_pages/404.html
    ErrorDocument 410 /error_pages/418.html
    ErrorDocument 422 /error_pages/418.html
    ErrorDocument 429 /error_pages/429.html
    ErrorDocument 451 /error_pages/418.html
    ErrorDocument 500 /error_pages/500.html
    ErrorDocument 502 /error_pages/502.html
    ErrorDocument 503 /error_pages/503.html
    ErrorDocument 504 /error_pages/504.html
</VirtualHost>
