# =============================================================================
# pnpm-Workspace-Config
# -----------------------------------------------------------------------------
# Trotz fehlender Workspace-Packages nutzt pnpm 10+ diese Datei für die globale
# Konfiguration (Build-Trust und Overrides).
# =============================================================================

# Postinstall-Scripts: Welche Pakete dürfen ihre Build-Scripts ausführen?
# (pnpm 10+ blockiert sie standardmäßig, ein Security-Feature)
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  sharp: true
  unrs-resolver: true

# Transitive Dependency-Overrides
# -----------------------------------------------------------------------------
# Zwingt bestimmte Versionen für transitive Pakete, unabhängig davon, was
# Parent-Pakete (z.B. vitest, tsx) nominell verlangen. Wird genutzt um
# Security-Patches durchzusetzen, ohne auf einen Parent-Bump warten zu müssen.
overrides:
  # CVE: server.fs.deny bypass on Windows alternate paths (high) +
  # launch-editor NTLMv2 hash disclosure via UNC path (medium).
  # Beide sind in vite 8.0.16 gepatcht. Exakt gepinnt (gleiche 8.0.x-Minor
  # wie zuvor, nur der Security-Patch). Ein Range-Override wurde von pnpm
  # hier nicht zuverlässig neu aufgelöst.
  vite: 8.0.16

  # CVE: XSS via Unescaped </style> in CSS Stringify Output
  # postcss < 8.5.0 ist betroffen.
  postcss: '>=8.5.0'

  # CVE: esbuild erlaubt arbitrary file read beim Dev-Server unter Windows.
  # Gepatcht in 0.28.1. Bounded auf 0.28.x, damit vite 8 kompatibel bleibt.
  esbuild: '>=0.28.1 <0.29'

  # CVE: js-yaml Quadratic-complexity DoS beim Merge-Key-Handling via
  # wiederholte Aliases. Gepatcht in 3.15.0 (3.x) bzw. 4.2.0 (4.x).
  # Scoped + gebounded, damit der 3.x-Consumer (@eslint/eslintrc) nicht auf
  # die inkompatible 4.x/5.x-API springt und der 4.x-Consumer (gray-matter)
  # innerhalb 4.x bleibt.
  js-yaml@3: '>=3.15.0 <4'
  js-yaml@4: '>=4.2.0 <5'
